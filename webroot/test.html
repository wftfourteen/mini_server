<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MiniServer - 测试页面</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 40px;
        }
        h1 { color: #e94560; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 800px;
        }
        .card {
            background: #16213e;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .card h3 { color: #0f3460; color: #667eea; }
        .card p { font-size: 14px; color: #aaa; margin-top: 8px; }
        a { color: #e94560; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>静态资源测试</h1>
    <p>如果你能看到这个页面，说明静态文件服务功能正常！</p>

    <div class="grid">
        <div class="card">
            <h3>HTML</h3>
            <p>文本/html 响应</p>
            <a href="/index.html">← 返回首页</a>
        </div>
        <div class="card">
            <h3>404 测试</h3>
            <p>访问不存在的路径</p>
            <a href="/not-exist.html">触发 404 →</a>
        </div>
        <div class="card">
            <h3>子路径</h3>
            <p>访问子目录文件</p>
            <a href="/sub/hello.html">/sub/hello.html →</a>
        </div>
        <div class="card">
            <h3>特殊字符</h3>
            <p>URL 编码解码</p>
            <a href="/test%20file.html">空格测试 →</a>
        </div>
    </div>

    <p style="margin-top: 40px; color: #666;">
        提示：在 webroot/ 目录下放置文件即可通过 URL 访问
    </p>
</body>
</html>
